name: P0 P1 Local Source Closeout

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  p0p1-closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node from repo
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Show environment
        run: |
          node -v
          npm -v
          uname -a

      - name: Clean generated artifacts
        run: |
          rm -rf .next artifacts node_modules
          mkdir -p artifacts

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run Batch144 P0/P1 local closeout
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          GIAOAN_P0P1_LOCAL_EVIDENCE_COMMAND_TIMEOUT_MS: "260000"
          GIAOAN_BUILD_TRACE_GRACE_MS: "0"
          GIAOAN_BUILD_ARTIFACT_READY_GRACE_MS: "0"
        run: |
          npm run source:validate
          npm run data:validate
          npm run batch144:p0-p1-build-closure-validate
          npm run p0-p1:local-evidence-runner
          npm run p0-p1:local-evidence-report
          npm run p0-p1:stability-report
          npm run p0-p1:final-closure-report

      - name: Assert local/source closure only
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const file = 'artifacts/p0-p1-final-closure-report-last-run.json';
          const r = JSON.parse(fs.readFileSync(file, 'utf8'));
          console.log(JSON.stringify({
            ok: r.ok,
            nodeVersion: r.nodeVersion,
            node24: r.node24,
            localP0P1Closed: r.localP0P1Closed,
            hostedPublicClosed: r.hostedPublicClosed,
            allP0P1PublicClosed: r.allP0P1PublicClosed,
            productionReady: r.productionReady,
            publicRolloutAllowed: r.publicRolloutAllowed,
            localClosurePercent: r.localClosurePercent,
            hostedClosurePercent: r.hostedClosurePercent,
            blockers: r.blockers
          }, null, 2));

          if (r.ok !== true) process.exit(1);
          if (r.localP0P1Closed !== true) process.exit(1);
          if (r.productionReady !== false) process.exit(1);
          if (r.publicRolloutAllowed !== false) process.exit(1);
          NODE

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0p1-closeout-evidence
          path: artifacts/**
          if-no-files-found: warn
